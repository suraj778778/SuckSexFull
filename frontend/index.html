<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuckSexFull</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #020617);
  color: white;
  overflow: hidden;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  height: 100vh;
  flex-direction: column;
}

/* VIDEO SECTION */
.video-section {
  flex: 1;
  display: flex;
}

/* LEFT (RANDOM USER) */
.remote {
  flex: 1;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* RIGHT (YOU) */
.local {
  width: 35%;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTROLS */
.controls {
  height: 120px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

/* BUTTONS */
button {
  padding: 15px 25px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

.start {
  background: #22c55e;
  color: white;
}

.next {
  background: #3b82f6;
  color: white;
}

.stop {
  background: #ef4444;
  color: white;
}

/* SELECT BOX */
select {
  padding: 12px;
  border-radius: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .video-section {
    flex-direction: column;
  }

  .local {
    width: 100%;
    height: 30%;
  }

  .remote {
    height: 70%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- VIDEO AREA -->
  <div class="video-section">

    <!-- RANDOM USER -->
    <div class="remote">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <!-- YOUR CAMERA -->
    <div class="local">
      <video id="localVideo" autoplay muted playsinline></video>
    </div>

  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="start" id="startBtn">Start</button>
    <button class="next" id="nextBtn">Next</button>
    <button class="stop" id="stopBtn">Stop</button>

    <select id="gender">
      <option value="">I am</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
  </div>

</div>

<script>
let localStream;

// START CAMERA
document.getElementById("startBtn").onclick = async () => {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("localVideo").srcObject = localStream;
  } catch (e) {
    alert("Camera permission denied");
  }
};

// STOP
document.getElementById("stopBtn").onclick = () => {
  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
  }
};

// NEXT (placeholder)
document.getElementById("nextBtn").onclick = () => {
  alert("Next user feature coming in next step");
};
</script>

</body>
</html>
