<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuckSexFull</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* VIDEO */
.video-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SMALL SELF VIEW */
#localVideo {
  width: 120px;
  height: 180px;
  bottom: 20px;
  right: 20px;
  position: absolute;
  border-radius: 10px;
  border: 2px solid white;
}

/* CONTROLS (LEFT SIDE VERTICAL) */
.controls {
  position: absolute;
  top: 50%;
  left: 10px;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 10;
}

button {
  padding: 12px 15px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}

.start { background: #22c55e; color: white; }
.next { background: #3b82f6; color: white; }
.stop { background: #ef4444; color: white; }

select {
  padding: 10px;
  border-radius: 8px;
}

/* MOBILE FIX */
@media (max-width: 768px) {
  #localVideo {
    width: 90px;
    height: 130px;
  }

  .controls {
    left: 5px;
    gap: 10px;
  }

  button {
    padding: 10px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="video-container">

  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay muted playsinline></video>

    </select>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</html>
