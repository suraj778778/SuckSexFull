<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuckSexFull</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .active {
      display: flex;
    }

    input, select {
      padding: 10px;
      margin: 10px;
      width: 220px;
    }

    button {
      padding: 12px 25px;
      margin-top: 15px;
      background: red;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    img {
      width: 250px;
      margin: 10px;
    }

    video {
      width: 300px;
      height: 200px;
      background: black;
      margin: 10px;
    }
  </style>
</head>

<body>

  <!-- LANDING -->
  <div id="landing-page" class="screen active">
    <h1>SuckSexFull</h1>
    <img src="poster.jpg">
    <p>Random chat & video calls</p>
    <button id="landing-continue">Continue</button>
  </div>

  <!-- SETUP -->
  <div id="setup-page" class="screen">
    <h2>Setup</h2>

    <input id="username" placeholder="Enter name">

    <select id="mode">
      <option value="">Select Mode</option>
      <option value="text">Chat</option>
      <option value="video">Video</option>
    </select>

    <button id="setup-continue">Continue</button>
  </div>

  <!-- SEARCH -->
  <div id="search-page" class="screen">
    <h2>Searching...</h2>
  </div>

  <!-- CHAT -->
  <div id="chat-page" class="screen">
    <h2>Chat Started</h2>
  </div>

  <!-- VIDEO -->
  <div id="video-page" class="screen">
    <h2>Video Call</h2>
    <video autoplay muted></video>
    <video autoplay></video>
  </div>

  <script>
    const screens = {
      landing: document.getElementById('landing-page'),
      setup: document.getElementById('setup-page'),
      search: document.getElementById('search-page'),
      chat: document.getElementById('chat-page'),
      video: document.getElementById('video-page'),
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    document.getElementById('landing-continue').onclick = () => {
      showScreen('setup');
    };

    document.getElementById('setup-continue').onclick = () => {
      const name = document.getElementById('username').value;
      const mode = document.getElementById('mode').value;

      if (!name || !mode) {
        alert("Enter details");
        return;
      }

      showScreen('search');

      setTimeout(() => {
        if (mode === "text") {
          showScreen('chat');
        } else {
          showScreen('video');
        }
      }, 1500);
    };
  </script>

</body>
</html>
