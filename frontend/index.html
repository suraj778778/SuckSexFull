<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuckSexFull</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="landing-page" class="screen active card center-content">
        <h1 class="brand">SuckSexFull</h1>
        <img src="poster.jpg" width="300">
        <p class="muted">Random chat & video calls with real people.</p>
        <button id="landing-continue" class="btn btn-primary bottom-btn">Continue</button>
      </section>

      <section id="setup-page" class="screen card">
       <h2>Setup</h2>

<input id="username" type="text" placeholder="Enter your name"><br>

<select id="gender">
  <option value="">Select Gender</option>
  <option value="male">Male</option>
  <option value="female">Female</option>
</select><br>

<select id="mode">
  <option value="">Choose Option</option>
  <option value="text">Chat</option>
  <option value="video">Video</option>
</select><br>

<button id="setup-continue" class="btn btn-primary">Continue</button>

<p id="setup-error" class="error-text"></p>
      </section>

      <section id="mode-page" class="screen card center-content">
        <h2>Select a Mode</h2>
        <div class="mode-buttons">
          <button data-mode="text" class="btn btn-primary mode-btn">Text Chat</button>
          <button data-mode="video" class="btn btn-secondary mode-btn">Video Call</button>
        </div>
      </section>

      <section id="search-page" class="screen card center-content">
        <div class="loader"></div>
        <h2>Searching...</h2>
        <p class="muted">Looking for a compatible random user.</p>
      </section>

      <section id="chat-page" class="screen card">
        <header class="panel-header">
          <div>
            <h3 id="chat-title">Text Chat</h3>
            <p id="chat-subtitle" class="muted"></p>
          </div>
          <div class="header-actions">
            <button id="chat-next" class="btn btn-secondary">Next</button>
            <button id="chat-add-friend" class="btn btn-secondary">Add Friend</button>
          </div>
        </header>

        <div id="chat-messages" class="messages"></div>

        <form id="chat-form" class="input-row" autocomplete="off">
          <input id="chat-input" type="text" placeholder="Type your message" />
          <button type="submit" class="btn btn-primary">Send</button>
        </form>

        <div class="reconnect-row">
          <button id="reconnect-last" class="btn btn-secondary">Reconnect with Last User</button>
          <select id="friend-select"></select>
          <button id="reconnect-friend" class="btn btn-secondary">Reconnect Friend</button>
        </div>
      </section>

      <section id="video-page" class="screen card">
        <header class="panel-header">
          <div>
            <h3>Video Call</h3>
            <p id="video-subtitle" class="muted"></p>
          </div>
          <div class="header-actions">
            <button id="video-end" class="btn btn-secondary">End Call</button>
            <button id="video-next" class="btn btn-secondary">Next User</button>
            <button id="video-add-friend" class="btn btn-secondary">Add Friend</button>
          </div>
        </header>

        <div class="video-grid">
          <video id="local-video" autoplay muted playsinline></video>
          <video id="remote-video" autoplay playsinline></video>
        </div>
      </section>

      <p id="global-notice" class="notice"></p>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
